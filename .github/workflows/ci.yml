name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        env:
          APP_ENV: testing
        run: python -m pytest --cov=app --cov-report=term-missing

  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  web-build:
    name: Public site · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    name: End-to-end · Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend (SQLite file, migrated + seeded, served on :3001) ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Migrate, seed and serve API
        working-directory: backend
        env:
          APP_ENV: development
          FLASK_APP: wsgi.py
        run: |
          flask db upgrade
          flask seed
          nohup flask run --port 3001 >/tmp/api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/health && break || sleep 1
          done

      # ── Frontend + Playwright ─────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npm run test:e2e
